name: Solicitud de mejora
description: Proponer una nueva función o mejora en Ejecútate!
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe el problema o la necesidad antes que la solución concreta. Así es más fácil valorar la propuesta.

  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Editor / pestañas / archivos
        - Interfaz del editor (sidebar, activity bar, status bar)
        - Markdown / documentación en editor
        - Terminal integrado
        - Búsqueda y reemplazo
        - Debugger / tutoriales / aprendizaje
        - Temas / accesibilidad / UX
        - Rendimiento
        - Documentación (Docs/ / README)
        - Empaquetado / instalación
        - Otro
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: ¿Qué problema o necesidad quieres resolver?
      placeholder: "Ej.: Al cerrar la app con varias pestañas modificadas, no avisa de cambios sin guardar."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta (opcional)
      description: Cómo imaginas que debería funcionar
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Alcance
      options:
        - label: Estoy dispuesto/a a contribuir con un PR si la propuesta encaja
          required: false
