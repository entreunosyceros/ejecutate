name: Informe de error
description: Algo no funciona como debería en Ejecútalo!
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error. Cuanta más información des, más fácil será reproducirlo.
        No incluyas rutas personales ni fragmentos de código confidencial.

  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Editor / pestañas / guardado
        - Explorador de archivos
        - Vista previa Markdown
        - Terminal integrado
        - Terminal del sistema (Vista → Abrir terminal)
        - Búsqueda / Command Palette
        - Panel Problems / sintaxis
        - Debugger visual (F5)
        - Tutoriales / análisis / paquetes (F4–F7)
        - Temas / preferencias / Modo Café
        - Arranque (run_app.py / dependencias)
        - Otro
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión o commit
      description: Rama o hash de commit si ejecutas desde código fuente
      placeholder: "main @ abc1234"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista numerada de acciones hasta ver el fallo
      placeholder: |
        1. Abrir README.md
        2. Activar vista previa con Ctrl+Shift+V
        3. Cerrar pestaña sin guardar
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs o capturas
      description: Salida de terminal, traceback o capturas
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      options:
        - Linux
        - Windows
        - macOS
        - No lo sé
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Versión de Python
      placeholder: "3.12.x"

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmación
      options:
        - label: He buscado en issues abiertas y cerradas y no he encontrado un duplicado
          required: true
